# Render Blueprint — SAYIBI AI backend
# https://render.com/docs/blueprint-spec
# Déploiement : Render Dashboard → New → Blueprint → connecter ce fichier

version: "1"
services:
  - type: web
    name: sayibi-backend
    runtime: python
    region: frankfurt
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: JWT_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: UPSTASH_REDIS_URL
        sync: false
      - key: UPSTASH_REDIS_TOKEN
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX_NAME
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false
      - key: SAYIBI_INTERNAL_SECRET
        sync: false
      # Front Flutter web sur Render (créer le service sayibi-web) + dev local
      - key: PUBLIC_APP_URL
        value: "https://sayibi-web.onrender.com"
      - key: CORS_ORIGINS
        value: "https://sayibi-web.onrender.com,http://localhost:3000,http://127.0.0.1:3000,http://localhost:8080,http://127.0.0.1:8080,http://localhost:8081,http://127.0.0.1:8081,http://localhost:8082,http://127.0.0.1:8082,http://localhost:5000,http://127.0.0.1:5000,http://localhost:4200,http://127.0.0.1:4200"
      # Toujours définir : sinon le health check Render échoue (400 Invalid host) si le hostname n’est pas listé.
      - key: TRUSTED_HOSTS
        value: "*.onrender.com,localhost,127.0.0.1"
